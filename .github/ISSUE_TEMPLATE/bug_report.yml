-name: Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels:
    - bug
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug! Please provide as much detail as possible.

    - type: textarea
      id: description
      attributes:
          label: Bug Description
          description: Clearly describe the problem.
          placeholder: What happened?
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: How can someone reproduce this issue?
          placeholder: |
              1. Run...
              2. Use...
              3. Observe...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          placeholder: What did you expect to happen?
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          placeholder: What actually happened?
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: Keysweep Version
          placeholder: v0.1.0
      validations:
          required: true

    - type: input
      id: os
      attributes:
          label: Operating System
          placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
      validations:
          required: true

    - type: textarea
      id: logs
      attributes:
          label: Logs or Screenshots
          description: Paste relevant output or attach screenshots.
          render: shell

    - type: checkboxes
      id: checks
      attributes:
          label: Checklist
          options:
              - label: I searched for existing issues before opening this one.
                required: true
              - label: I can reproduce this issue consistently.
                required: true
